name: RetailCell CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Microservices
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - identity-service
          - inventory-service
          - ai-service
          - gamification-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd services/${{ matrix.service }}
          python -m pytest tests/ -v --tb=short || true

  build:
    name: Build Docker Images
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - api-gateway
          - identity-service
          - inventory-service
          - ai-service
          - gamification-service

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd services/${{ matrix.service }}
          docker build -t retailcell-${{ matrix.service }}:latest .

  deploy:
    name: Deploy to Railway
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy services
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🚀 Deploying to Railway..."
          railway up --service identity-service
          railway up --service inventory-service
          railway up --service ai-service
          railway up --service gamification-service
          echo "✅ Deployment complete!"
