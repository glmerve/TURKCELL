upstream identity_service {
    server identity-service:8001;
}

upstream inventory_service {
    server inventory-service:8002;
}

upstream ai_service {
    server ai-service:8003;
}

upstream gamification_service {
    server gamification-service:8004;
}

server {
    listen 80;
    server_name localhost;

    # Gzip compression
    gzip on;
    gzip_types application/json text/plain application/javascript text/css;

    # Request size limit
    client_max_body_size 10M;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # CORS headers
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;

    # Preflight requests
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ---- Identity Service ----
    location /api/v1/auth/ {
        proxy_pass http://identity_service/api/v1/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/users/ {
        proxy_pass http://identity_service/api/v1/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/audit-logs/ {
        proxy_pass http://identity_service/api/v1/audit-logs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Identity Swagger
    location /identity/docs {
        proxy_pass http://identity_service/docs;
    }
    location /identity/openapi.json {
        proxy_pass http://identity_service/openapi.json;
    }

    # ---- Inventory Service ----
    location /api/v1/products/ {
        proxy_pass http://inventory_service/api/v1/products/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/supply-requests/ {
        proxy_pass http://inventory_service/api/v1/supply-requests/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/cases/ {
        proxy_pass http://inventory_service/api/v1/cases/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/messages/ {
        proxy_pass http://inventory_service/api/v1/messages/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/dashboard/ {
        proxy_pass http://inventory_service/api/v1/dashboard/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Inventory Swagger
    location /inventory/docs {
        proxy_pass http://inventory_service/docs;
    }
    location /inventory/openapi.json {
        proxy_pass http://inventory_service/openapi.json;
    }

    # ---- AI Service ----
    location /api/v1/ai/ {
        proxy_pass http://ai_service/api/v1/ai/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # AI Swagger
    location /ai/docs {
        proxy_pass http://ai_service/docs;
    }
    location /ai/openapi.json {
        proxy_pass http://ai_service/openapi.json;
    }

    # ---- Gamification Service ----
    location /api/v1/gamification/ {
        proxy_pass http://gamification_service/api/v1/gamification/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Gamification Swagger
    location /gamification/docs {
        proxy_pass http://gamification_service/docs;
    }
    location /gamification/openapi.json {
        proxy_pass http://gamification_service/openapi.json;
    }

    # ---- Health Check ----
    location /health {
        return 200 '{"service":"api-gateway","status":"healthy"}';
        add_header Content-Type application/json;
    }

    # ---- Default ----
    location / {
        return 404 '{"error":"Endpoint bulunamadı."}';
        add_header Content-Type application/json;
    }
}
